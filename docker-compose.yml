# ============================================================================
# Toroloom — Development Database & Cache Services
# ============================================================================
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v
#
# Services:
#   postgres   — Primary relational store (port 5432)
#   mongodb    — Document store for flexible schemas (port 27017)
#   pgbouncer  — Connection pooler for PostgreSQL (port 6432)
#   redis      — Cache + pub/sub for cross-worker sync (port 6379)
# ============================================================================

services:
  # ──── PgBouncer Connection Pooler ──────────────────────────────────────
  # Sits between the app and PostgreSQL.  The app connects to :6432,
  # PgBouncer multiplexes to :5432.  This keeps DB connections low even
  # under high app concurrency.
  #
  # Pool mode: transaction — safe for REST + WebSocket workloads.
  # Config: backend/pgbouncer/pgbouncer.ini
  #
  # ──── PgBouncer Connection Pooler — edoburu/pgbouncer ─────────────────
  # Replaced bitnami/pgbouncer:1.23 (deprecated/removed from Docker Hub)
  # with edoburu/pgbouncer which is actively maintained.
  #
  # Config via env vars:
  #   DB_HOST, DB_PORT, DB_USER, DB_PASSWORD, DB_NAME  → PostgreSQL target
  #   POOL_MODE, DEFAULT_POOL_SIZE, MAX_CLIENT_CONN    → Pool tuning
  #   AUTH_TYPE                                         → trust for Docker network
  #
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.2-p0
    container_name: toroloom-pgbouncer
    restart: unless-stopped
    ports:
      - '6432:6432'
    volumes:
      # Mount local pgbouncer.ini for full config control
      - ./backend/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./backend/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    environment:
      # ── PostgreSQL connection (internal Docker network) ──
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: toroloom
      DB_PASSWORD: toroloom_dev
      DB_NAME: toroloom

      # ── Pool tuning ──
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: '20'
      MAX_CLIENT_CONN: '200'
      RESERVE_POOL_SIZE: '3'
      QUERY_TIMEOUT: '30'

      # ── Auth ──
      AUTH_TYPE: trust

      # ── Listen ──
      LISTEN_PORT: '6432'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost -p 6432 -U toroloom -d toroloom']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    container_name: toroloom-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: toroloom
      POSTGRES_PASSWORD: toroloom_dev
      POSTGRES_DB: toroloom
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Schema is auto-migrated by PostgreSQLStorage.migrate() on app startup.
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toroloom -d toroloom']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mongodb:
    image: mongo:7-jammy
    container_name: toroloom-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: toroloom
      MONGO_INITDB_ROOT_PASSWORD: toroloom_dev
      MONGO_INITDB_DATABASE: toroloom
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ──── Redis (cache + pub/sub for cross-worker sync) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: toroloom-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    # No password in dev — only accessible on localhost
    command: ['redis-server', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pgdata:
  mongodata:
