; ============================================================================
; Toroloom — PgBouncer Configuration
; ============================================================================
;
; PgBouncer sits BETWEEN the app and PostgreSQL, managing a pool of
; persistent connections so that 200+ app connections share 20–50 actual
; DB connections.  This prevents connection exhaustion under load.
;
; Pooling mode: transaction
;   - Connections return to the pool AFTER each transaction, not after the
;     client disconnects.  This is the safest and most performant mode for
;     a REST+WebSocket API that issues short-lived queries.
;
; Listen port: 6432 (standard PgBouncer port, non-privileged)
;
; ============================================================================

[databases]
; ── Primary database ─────────────────────────────────────────────────────────
; The app connects to PgBouncer via DATABASE_URL pointing to localhost:6432.
; PgBouncer forwards to the actual PostgreSQL instance.
;
; In Docker Compose: PgBouncer connects to the 'postgres' container by name.
; In Railway:        Replace host with the Railway PostgreSQL endpoint.
; In RDS:            Replace host with the RDS writer endpoint.
toroloom = host=postgres port=5432 dbname=toroloom

; ── Read replica (optional, for analytics offload) ──────────────────────────
; Uncomment when a read replica is provisioned.  The app uses
; DATABASE_URL_READER (or reads from this database entry via a different
; connection string) for SELECT-heavy queries.
;
; toroloom_reader = host=postgres-reader port=5432 dbname=toroloom

[pgbouncer]
; ── Network ─────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432

; ── Pool settings ───────────────────────────────────────────────────────────
pool_mode = transaction
default_pool_size = 20
max_client_conn = 200
max_db_connections = 50

; ── Timeouts ────────────────────────────────────────────────────────────────
server_idle_timeout = 600          ; 10 min — close idle server connections
client_idle_timeout = 120          ; 2 min  — drop idle clients
query_timeout = 30                 ; 30s    — kill queries exceeding this
query_wait_timeout = 10            ; 10s    — how long a client waits for a pool slot
idle_transaction_timeout = 60      ; 60s    — close connections stuck in idle-in-transaction

; ── Authentication ──────────────────────────────────────────────────────────
auth_type = trust                  ; Docker internal network — trust is safe.
                                   ; For RDS/external, change to 'md5' and
                                   ; populate userlist.txt with SCRAM hashes.
auth_file = /etc/pgbouncer/userlist.txt

; ── Logging ─────────────────────────────────────────────────────────────────
log_connections = 1                ; Log when clients connect/disconnect
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60                  ; Log stats every 60s

; ── Tuning ──────────────────────────────────────────────────────────────────
; Disable DNS lookups (we use container names or static IPs)
dns_max_ttl = 300
dns_nxdomain_ttl = 60

; Reserve a few connections for admin (so you can still connect when full)
reserve_pool_size = 3
reserve_pool_timeout = 3

; ── TLS (only needed for external/exposed deployments) ───────────────────────
; client_tls_sslmode = require
; client_tls_key_file = /etc/pgbouncer/tls/key.pem
; client_tls_cert_file = /etc/pgbouncer/tls/cert.pem
