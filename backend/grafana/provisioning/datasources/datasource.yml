# ============================================================================
# Toroloom Grafana Datasource Provisioning
# ============================================================================
#
# Ensures a Prometheus datasource exists with a predictable UID (`prometheus`)
# so both the dashboard and alert rules can reference it reliably.
#
# Place in: /etc/grafana/provisioning/datasources/ (or mount as volume)
# ============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      queryTimeout: 30s
      httpMethod: POST
