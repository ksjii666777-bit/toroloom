# ============================================================================
# Toroloom Grafana Notification Policies — Alert Routing
# ============================================================================
#
# Routes all toroloom-websocket alerts to Slack.
# Critical-severity alerts also route to PagerDuty (via continue: true).
#
# Contact points are defined in contact_points.yml and referenced by name.
# ============================================================================

apiVersion: 1

policies:
  - orgId: 1
    receiver: Slack WebSocket Alerts
    group_by:
      - alertname
      - severity
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Critical alerts → Slack (inherited) + PagerDuty
      - receiver: PagerDuty WebSocket Alerts
        object_matchers:
          - ['severity', '=', 'critical']
        continue: true
        group_wait: 15s
        group_interval: 2m
        repeat_interval: 1h
