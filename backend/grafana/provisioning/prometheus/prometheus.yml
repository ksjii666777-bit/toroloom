# ============================================================================
# Toroloom Prometheus Scrape Configuration
# ============================================================================
#
# This file configures Prometheus to scrape metrics from the Toroloom backend.
# It is designed for Grafana's Prometheus datasource provisioning pipeline or
# as a standalone Prometheus server configuration.
#
# Usage (standalone Prometheus):
#   Mount this file at /etc/prometheus/prometheus.yml
#
# Usage (Docker Compose):
#   services:
#     prometheus:
#       image: prom/prometheus:latest
#       volumes:
#         - ./backend/grafana/provisioning/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
#       ports:
#         - "9090:9090"
#       depends_on:
#         - backend
#
# The backend exposes Prometheus metrics at GET /metrics on port 3000.
# See: backend/src/routes/metrics.ts
# ============================================================================

# ──── Global Defaults ─────────────────────────────────────────────────────
global:
  scrape_interval: 15s      # How often to scrape targets
  scrape_timeout: 10s       # Timeout for each scrape request
  evaluation_interval: 15s  # How often to evaluate alerting rules

# ──── Alerting Configuration ──────────────────────────────────────────────
# Grafana handles alert rule evaluation when Prometheus is used as a data
# source.  If you run a standalone Alertmanager, configure it here.
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # Add your Alertmanager targets:
          # - targets: ['alertmanager:9093']

# ──── Rule Files ──────────────────────────────────────────────────────────
# Grafana Unified Alerting rules are provisioned via the Grafana API / YAML.
# If you need standalone Prometheus alerting rules, uncomment below:
# rule_files:
#   - "/etc/prometheus/rules/*.yml"

# ──── Scrape Jobs ─────────────────────────────────────────────────────────
scrape_configs:

  # ──── Toroloom Backend ─────────────────────────────────────────────
  # Scrapes the primary backend process. In cluster mode, each worker is
  # scraped separately via the same endpoint — the registry aggregates
  # metrics across all workers through the shared IPC bridge.
  - job_name: 'toroloom-backend'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    scheme: http

    # ── Target Discovery ─────────────────────────────────────────
    # Prometheus uses Docker DNS service discovery when running inside the
    # same Docker Compose network as the backend. The static_configs below
    # serve as a fallback for standalone / local dev.
    #
    # ⚠ Linux users: 'host.docker.internal' only works on Docker Desktop
    # (Windows / macOS). On Linux, use only 'localhost:3000' and the
    # Docker DNS discovery (uncomment below).
    dns_sd_configs:
      - names:
          - 'backend'        # Docker Compose service name
        type: 'A'
        port: 3000

    static_configs:
      - targets:
          - 'host.docker.internal:3000'  # Docker Desktop only (Win/Mac)
        labels:
          service: toroloom
          tier: backend

    # ── Metric Relabeling ────────────────────────────────────────
    # Attach consistent instance label regardless of which target was scraped.
    metric_relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'toroloom-backend:3000'

    # ── Health Check ─────────────────────────────────────────────
    # Consul / Kubernetes health checks can be integrated here.
    # For Docker, the backend's /health endpoint is used by the container
    # healthcheck (see docker-compose.prod.yml).

  # ──── Prometheus Self-Monitoring ──────────────────────────────────
  # Prometheus scrapes itself to report its own operational metrics
  # (scrape duration, targets up/down, etc.).
  - job_name: 'prometheus'
    scrape_interval: 30s
    static_configs:
      - targets:
          - 'localhost:9090'
        labels:
          service: toroloom
          tier: monitoring

# ──── Label Hierarchy ───────────────────────────────────────────────────
# All Toroloom metrics carry the following label structure:
#   service: toroloom       — identifies the project
#   tier: backend           — distinguishes from monitoring / frontend
#   job: toroloom-backend   — the scrape job name
#   instance: toroloom-backend:3000  — specific instance
#
# The Grafana dashboard queries do NOT filter on job by default (they are
# designed to work with any Prometheus data source). If you need to
# distinguish multiple scrape targets (e.g., staging vs production),
# add job="toroloom-backend" to the dashboard PromQL expressions.
