# ==============================================================================
# Toroloom — Kubernetes Secrets Template
# ==============================================================================
#
# IMPORTANT: Do NOT commit actual secrets to Git. This file is a template.
# Create the actual secrets via kubectl or an external secrets operator:
#
#   kubectl create secret generic toroloom-secrets \
#     --namespace toroloom \
#     --from-literal=JWT_SECRET='<generate: openssl rand -hex 32>' \
#     --from-literal=DATABASE_URL='postgresql://toroloom:password@pgbouncer:6432/toroloom' \
#     --from-literal=DATABASE_URL_READER='postgresql://toroloom:password@reader-endpoint:6432/toroloom' \
#     --from-literal=REDIS_URL='redis://:password@redis:6379'
#
# For production, use:
#   - External Secrets Operator (aws/secrets manager)
#   - sealed-secrets (Bitnami)
#   - SOPS + age
#
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: toroloom-secrets
  namespace: toroloom
  labels:
    app.kubernetes.io/name: toroloom
    app.kubernetes.io/part-of: toroloom
type: Opaque
stringData:
  # ── Required ─────────────────────────────────────────────────────────────
  JWT_SECRET: "change-me-to-a-random-hex-string"

  # ── Storage (choose one) ────────────────────────────────────────────────
  # Point DATABASE_URL to PgBouncer (port 6432) for connection pooling.
  # For direct PostgreSQL (dev): use port 5432.
  DATABASE_URL: "postgresql://toroloom:password@pgbouncer:6432/toroloom"
  # DATABASE_URL_READER: "postgresql://toroloom:password@reader:6432/toroloom"

  # ── Redis (pub/sub + caching) ───────────────────────────────────────────
  REDIS_URL: "redis://:password@redis:6379"

  # ── Sentry (optional) ──────────────────────────────────────────────────
  # SENTRY_DSN: "https://key@o123.ingest.us.sentry.io/project"

  # ── Broker credentials (optional, set when ready) ──────────────────────
  # ANGEL_CLIENT_ID: ""
  # ANGEL_API_KEY: ""
  # ANGEL_ACCESS_TOKEN: ""
  # ZERODHA_API_KEY: ""
  # ZERODHA_API_SECRET: ""
  # ZERODHA_ACCESS_TOKEN: ""

  # ── AI providers (optional) ────────────────────────────────────────────
  # OPENROUTER_API_KEY: ""
  # GOOGLE_GEMINI_API_KEY: ""

  # ── Payments (optional) ────────────────────────────────────────────────
  # RAZORPAY_KEY_ID: ""
  # RAZORPAY_KEY_SECRET: ""
