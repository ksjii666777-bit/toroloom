# =============================================================================
# Forgot Password — Edge Case Flow
# =============================================================================
# Tests that tapping "Forgot Password?" on the login screen keeps the app
# in a stable state (no crashes, navigation errors, or blank screens).
# =============================================================================

appId: host.exp.exponent
---
# ── Verify login screen is ready ──────────────────────────────────────────
- assertVisible:
    text: "Welcome Back! 👋"
- assertVisible:
    text: "Forgot Password?"

# ── Tap the Forgot Password link ─────────────────────────────────────────
- tapOn:
    text: "Forgot Password?"

# ── Verify the app stays on login screen (no crash / blank screen) ────────
- waitForAnimationToEnd:
    timeout: 3000

# Confirm key login screen elements are still present
- assertVisible:
    text: "Welcome Back! 👋"
- assertVisible:
    text: "Log In"
- assertVisible:
    text: "Don't have an account?"
- assertVisible:
    text: "Enter your email"
- assertVisible:
    text: "Enter your password"
