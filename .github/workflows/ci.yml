# ==============================================================================
# Toroloom CI — Runs on every push and pull request to the default branch.
#
# Jobs (run in parallel):
#   backend              → TypeScript compilation + unit tests (vitest, no databases)
#   backend-integration  → PostgreSQL + MongoDB integration tests (requires services)
#   frontend             → TypeScript compilation + vitest tests
#   stress               → Long-running WebSocket stress test (separate job, 30 min)
#
# Integration tests spin up PostgreSQL and MongoDB via GitHub Actions service
# containers, then run the *.int.test.ts suites against them.
# ==============================================================================

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:           # Allow manual trigger from the Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true     # Cancel in-flight runs on the same branch

env:
  NODE_VERSION: '20'

jobs:

  # ── Backend: TypeScript compilation + unit tests ──────────────────────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false          # Don't cancel other jobs if this one fails

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npm run typecheck

      - name: Lint check
        run: npm run lint

      - name: Run unit tests with coverage (excluding integration tests)
        # Also exclude cross-file isolation tests — they run in a dedicated
        # job (cross-file-isolation) with singleFork=true so the singleton
        # is shared across files. Running them here (separate forks) would
        # produce a false pass trivially.
        run: npx vitest run --reporter=verbose --coverage --exclude='**/*.int.test.ts' --exclude='**/*CrossFile*.test.ts'
        env:
          NODE_ENV: test

      - name: Upload backend coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 14

      # Post coverage summary to the GitHub Actions job summary (visible in
      # the Actions UI itself, not just on PRs). Reads the already-generated
      # coverage/coverage-summary.json — no need to re-run tests.
      - name: Post coverage summary to job summary
        if: always()
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const t = p.total;
            const fmt = (o) => o.pct + '% (' + o.covered + '/' + o.total + ')';
            const summary = [
              '### Backend Coverage',
              '',
              '| Statements | Branches | Functions | Lines |',
              '|------------|----------|-----------|-------|',
              '| ' + fmt(t.statements) + ' | ' + fmt(t.branches) + ' | ' + fmt(t.functions) + ' | ' + fmt(t.lines) + ' |',
              '',
              '> Thresholds: statements 40% | branches 36% | functions 35% | lines 40%',
              ''
            ].join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          "

      # Explicit coverage threshold gate — fails the build if any metric
      # drops below the configured minimum. Threshold values are mirrored
      # from backend/vitest.config.ts coverage.thresholds and must be kept
      # in sync.
      - name: Check coverage thresholds
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const t = p.total;
            const thresholds = {
              statements: 40,
              branches: 36,
              functions: 35,
              lines: 40,
            };
            let failed = false;
            for (const [key, threshold] of Object.entries(thresholds)) {
              const actual = t[key].pct;
              const status = actual >= threshold ? 'PASS' : 'FAIL';
              console.log(status + ': ' + key + ' ' + actual + '% (threshold: ' + threshold + '%)');
              if (actual < threshold) failed = true;
            }
            if (failed) {
              console.log('BACKEND COVERAGE THRESHOLDS NOT MET — failing build');
              process.exit(1);
            }
            console.log('All backend coverage thresholds met!');
          "

      # Generate shields.io-compatible badge JSON from coverage summary.
      # Uploaded as an artifact so the coverage-badge job can combine both
      # frontend and backend badges and deploy them to gh-pages.
      - name: Generate coverage badge JSON
        if: success() || failure()
        shell: bash
        run: |
          mkdir -p badge-artifact
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "Coverage summary not found — skipping badge generation"
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const lines = p.total.lines.pct;
            const color = lines >= 90 ? 'brightgreen'
              : lines >= 80 ? 'green'
              : lines >= 70 ? 'yellowgreen'
              : lines >= 60 ? 'yellow'
              : lines >= 50 ? 'orange'
              : 'red';
            const badge = {
              schemaVersion: 1,
              label: 'backend',
              message: lines + '%',
              color: color,
            };
            fs.writeFileSync('badge-artifact/backend-coverage.json', JSON.stringify(badge, null, 2) + '\n');
            console.log('Backend coverage badge: ' + lines + '% (' + color + ')');
          "

      # Note: upload-artifact paths are relative to the workspace root,
      # NOT the job's defaults.run.working-directory. The badge JSON was
      # created at backend/badge-artifact/ (because working-directory is
      # backend), so we must specify backend/badge-artifact/ here.
      - name: Upload backend coverage badge
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-badge
          path: backend/badge-artifact/
          retention-days: 7

  # ── Frontend: TypeScript compilation + vitest unit tests + coverage ─────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Vitest globals (`vi`, `describe`, `it`, `expect`) are made available
      # to TypeScript via src/vitest.d.ts  —  no separate test tsconfig needed.
      - name: TypeScript compilation check
        run: npm run typecheck

      - name: Lint check
        run: npm run lint

      - name: Run vitest tests with coverage
        run: npx vitest run --reporter=verbose --coverage
        env:
          NODE_ENV: test

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

      # Post coverage summary to the GitHub Actions job summary (visible in
      # the Actions UI itself, not just on PRs). Reads the already-generated
      # coverage/coverage-summary.json — no need to re-run tests.
      - name: Post coverage summary to job summary
        if: always()
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const t = p.total;
            const fmt = (o) => o.pct + '% (' + o.covered + '/' + o.total + ')';
            const summary = [
              '### Frontend Coverage',
              '',
              '| Statements | Branches | Functions | Lines |',
              '|------------|----------|-----------|-------|',
              '| ' + fmt(t.statements) + ' | ' + fmt(t.branches) + ' | ' + fmt(t.functions) + ' | ' + fmt(t.lines) + ' |',
              '',
              '> Thresholds: statements 75% | branches 65% | functions 70% | lines 75%',
              ''
            ].join('\n');
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          "

      # Explicit coverage threshold gate — fails the build if any metric
      # drops below the configured minimum. Threshold values are mirrored
      # from vitest.config.ts coverage.thresholds and must be kept in sync.
      - name: Check coverage thresholds
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const t = p.total;
            const thresholds = {
              statements: 75,
              branches: 65,
              functions: 70,
              lines: 75,
            };
            let failed = false;
            for (const [key, threshold] of Object.entries(thresholds)) {
              const actual = t[key].pct;
              const status = actual >= threshold ? 'PASS' : 'FAIL';
              console.log(status + ': ' + key + ' ' + actual + '% (threshold: ' + threshold + '%)');
              if (actual < threshold) failed = true;
            }
            if (failed) {
              console.log('FRONTEND COVERAGE THRESHOLDS NOT MET — failing build');
              process.exit(1);
            }
            console.log('All frontend coverage thresholds met!');
          "

      # Post a coverage summary comment on pull requests
      - name: PR coverage comment
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: ./

      # Generate shields.io-compatible badge JSON from coverage summary.
      # Uploaded as an artifact so the coverage-badge job can deploy them.
      - name: Generate coverage badge JSON
        if: success() || failure()
        shell: bash
        run: |
          mkdir -p badge-artifact
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "Coverage summary not found — skipping badge generation"
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('coverage/coverage-summary.json','utf8'));
            const lines = p.total.lines.pct;
            const color = lines >= 90 ? 'brightgreen'
              : lines >= 80 ? 'green'
              : lines >= 70 ? 'yellowgreen'
              : lines >= 60 ? 'yellow'
              : lines >= 50 ? 'orange'
              : 'red';
            const badge = {
              schemaVersion: 1,
              label: 'frontend',
              message: lines + '%',
              color: color,
            };
            fs.writeFileSync('badge-artifact/frontend-coverage.json', JSON.stringify(badge, null, 2) + '\n');
            console.log('Frontend coverage badge: ' + lines + '% (' + color + ')');
          "

      - name: Upload frontend coverage badge
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-badge
          path: badge-artifact/
          retention-days: 7

  # ── Backend cross-file isolation test ─────────────────────────────────────
  # Runs all 10 cross-file test files (riskEngine, auditTrail, brokerState,
  # circuitBreaker, wsState — each as File A + File B pairs) in the SAME
  # vitest fork to verify that afterAll cleanup properly isolates each
  # singleton across test file boundaries. This would be a false pass if
  # run with the default pool (separate forks = natural isolation).
  cross-file-isolation:
    name: Backend — Cross-File Isolation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run cross-file isolation test (singleFork = same process)
        # All 10 cross-file test files (5 singleton pairs) run in the same
        # fork to verify that afterAll cleanup prevents state leakage
        # between test files.
        run: npx vitest run --config vitest.cross-file.config.ts --reporter=verbose src/__tests__/riskCrossFileA.test.ts src/__tests__/riskCrossFileB.test.ts src/__tests__/auditCrossFileA.test.ts src/__tests__/auditCrossFileB.test.ts src/__tests__/brokerCrossFileA.test.ts src/__tests__/brokerCrossFileB.test.ts src/__tests__/circuitCrossFileA.test.ts src/__tests__/circuitCrossFileB.test.ts src/__tests__/wsCrossFileA.test.ts src/__tests__/wsCrossFileB.test.ts
        env:
          NODE_ENV: test

  # ── Backend integration tests (PostgreSQL + MongoDB) ─────────────────────
  backend-integration:
    name: Backend — Integration (PG + Mongo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false

    # Service containers — GitHub Actions makes them reachable via localhost
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: toroloom
          POSTGRES_PASSWORD: toroloom_dev
          POSTGRES_DB: toroloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toroloom -d toroloom"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      mongodb:
        image: mongo:7-jammy
        env:
          MONGO_INITDB_ROOT_USERNAME: toroloom
          MONGO_INITDB_ROOT_PASSWORD: toroloom_dev
          MONGO_INITDB_DATABASE: toroloom
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet -u toroloom -p toroloom_dev --authenticationDatabase admin --eval 'db.adminCommand(\"ping\")' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 20s

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Integration tests share databases (MongoDB/PostgreSQL) and
      # singletons (riskEngine, auditTrail).  fileParallelism: false is
      # already set in vitest.config.ts, so there's no need for a CLI flag.
      - name: Run integration tests (PostgreSQL + MongoDB)
        run: npx vitest run --reporter=verbose src/__tests__/*.int.test.ts
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://toroloom:toroloom_dev@localhost:5432/toroloom
          MONGODB_URI: mongodb://toroloom:toroloom_dev@localhost:27017/toroloom?authSource=admin
          MONGODB_DB_NAME: toroloom_test
          # Conservative connect timeout for slow GitHub Actions runners
          CONNECT_TIMEOUT_MS: 25000

  # ── Backend stress test (long-running, independent job) ───────────────────
  # Runs in parallel with backend + frontend + integration. No `needs`
  # dependency because it compiles its own TypeScript via vitest.
  stress:
    name: Backend — WebSocket Stress
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: backend
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run WebSocket PnL bridge stress test
        run: npx vitest run --reporter=verbose src/__tests__/websocketPnLBridge.stress.test.ts
        env:
          NODE_ENV: test
        timeout-minutes: 25

  # ── E2E Tests (Maestro on Android emulator) ───────────────────────────────
  # Runs Maestro E2E flows against an Android emulator via Expo Go.
  #
  # IMPORTANT: The committed Maestro config.yaml targets appId
  # `com.anonymous.Toroloom` (for dev builds). But CI runs via
  # `npx expo start --android` which opens in Expo Go (appId:
  # `host.exp.exponent`). We override the appId via `--app-id` so
  # the flows work against Expo Go in CI.
  #
  # For testing against dev builds locally, use:
  #   npx expo run:android && maestro test .maestro/flows
  #
  # ── DISABLED: E2E — Maestro (Android) ──────────────────────────────────
  # GitHub Actions free runners lack nested virtualization (KVM/haxm),
  # causing the Android emulator to time out during boot (44+ min on a
  # 30-min timeout). Run these flows locally on a real device or local
  # emulator.
  #
  # Re-enable by removing the `if: false` line below.
  # ───────────────────────────────────────────────────────────────────────
  e2e:
    if: false
    name: E2E — Maestro (Android)
    runs-on: macos-14
    timeout-minutes: 45
    continue-on-error: true   # Emulator startup can be flaky; don't block CI
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
        shell: bash

      - name: Validate Maestro flows
        run: |
          maestro --version
          echo "Checking flow files..."
          for f in .maestro/flows/**/*.yaml; do
            echo "  ✓ $f"
          done

      # Wrapped in Wandalen/wretry.action so if the emulator boot times out,
      # it is retried once automatically before failing the step.
      - name: Boot Android emulator and run E2E tests (retry once on failure)
        uses: Wandalen/wretry.action@v3.1.0
        with:
          action: reactivecircus/android-emulator-runner@v2
          attempt_limit: 2
          attempt_delay: 5000
          with: |
            api-level: 34
            # google_apis images include Google Play Services which Expo Go
            # requires. google_atd images are lighter but may lack Play
            # Services compatibility — stick with google_apis for safety.
            target: google_apis
            # x86_64 with google_apis is the most reliably compatible
            # combination across all macOS runner variants (Intel + Apple
            # Silicon). arm64-v8a can cause "adb: device not found" errors
            # on some runner instances due to AVD corruption across retries.
            arch: x86_64
            avd-name: Pixel_6_Pro
            emulator-boot-timeout: 1800
            # Allocate enough memory/cores so the emulator doesn't OOM on
            # resource-constrained cloud runners (macos-14 has ~14 GB RAM).
            # The -no-snapshot flag forces a cold boot every time, which
            # is slower but avoids stale snapshot corruption across retries.
            emulator-options: -no-window -no-snapshot -noaudio -no-boot-anim -gpu swiftshader_indirect -memory 2048 -cores 4
            disable-animations: true
            script: |
              # ── 1. Wait for device to appear ──
              echo "Waiting for emulator device to appear..."
              adb wait-for-device
              echo "Emulator device detected."

              # ── 2. Wait for full boot completion ──
              # sys.boot_completed=1 means the Android system is fully
              # booted and the home screen is reachable. Without this
              # check, adb may find the device while it's still in the
              # boot animation, causing "adb: device not found" errors
              # in subsequent steps.
              echo "Waiting for sys.boot_completed..."
              for i in $(seq 1 120); do
                BOOT_COMPLETED=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r\n')
                if [ "$BOOT_COMPLETED" = "1" ]; then
                  echo "Boot completed!"
                  break
                fi
                if [ $i -eq 120 ]; then
                  echo "Timed out waiting for boot completion."
                  adb devices -l
                  adb shell getprop 2>/dev/null | head -20 || true
                  exit 1
                fi
                sleep 5
              done

              # ── 3. Disable animations for reliable Maestro taps ──
              adb shell settings put global window_animation_scale 0.0
              adb shell settings put global transition_animation_scale 0.0
              adb shell settings put global animator_duration_scale 0.0
              echo "Animations disabled."

              # ── 4. Start Expo dev server in background ──
              echo "Starting Expo dev server..."
              npx expo start --android 2>&1 | tee /tmp/expo.log &
              EXPO_PID=$!

              # ── 5. Wait for Metro bundler to be ready ──
              echo "Waiting for Metro bundler..."
              timeout 180 bash -c '
                until grep -qi "Metro\|bundler\|ready\|exp://" /tmp/expo.log 2>/dev/null; do
                  sleep 5
                  printf "."
                done
                echo ""
                echo "Expo/Metro server is ready!"
              '
              # Give Expo a moment to push the app to the emulator
              sleep 15

              # ── 6. Run Maestro tests ──
              # Override appId from config.yaml (com.anonymous.Toroloom) to
              # host.exp.exponent because CI uses Expo Go, not a dev build.
              echo "Running Maestro E2E flows..."
              maestro test .maestro/flows --app-id host.exp.exponent

  # ── Coverage badge deployment ────────────────────────────────────────────
  # Runs after frontend and backend (with their coverage data) finish.
  # Downloads the badge JSONs generated by each job and deploys them to the
  # gh-pages branch so shields.io can read them via raw GitHub URLs.
  coverage-badge:
    name: Coverage Badge
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download frontend coverage badge
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-badge
          path: badges/

      - name: Download backend coverage badge
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-badge
          path: badges/

      - name: Deploy badges to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          destination_dir: badges
          keep_files: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
